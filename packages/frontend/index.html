<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic GUI</title>
</head>
<body>
  <!-- Liquid Glass SVG Engine -->
  <svg width="0" height="0" style="position: absolute; pointer-events: none;">
    <defs>
      <filter id="liquid-glass-displacement-filter" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="1" result="noise" />
        <feColorMatrix type="matrix" values="0.8 0 0 0 0  0 0.8 0 0 0  0 0 0.8 0 0  0 0 0 0.5 0" in="noise" result="coloredNoise" />
        <feDisplacementMap in="SourceGraphic" in2="coloredNoise" scale="12" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
